<!doctype html>
<html lang="zh-Hans">
<head>
	<title>采购报告</title>
	<meta charset="utf-8" />
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }
		.toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #181825; border-bottom: 1px solid #313244; flex-shrink: 0; flex-wrap: wrap; }
		.toolbar button { padding: 5px 12px; border: 1px solid #45475a; border-radius: 5px; background: #313244; color: #cdd6f4; cursor: pointer; font-size: 12px; }
		.toolbar button:hover { background: #45475a; }
		.toolbar button.primary { background: #89b4fa; color: #1e1e2e; border-color: #89b4fa; font-weight: 600; }
		.toolbar button.active { background: #f9e2af; color: #1e1e2e; border-color: #f9e2af; }
		.toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
		.toolbar .sep { width: 1px; height: 20px; background: #45475a; margin: 0 4px; }
		.toolbar .spacer { flex: 1; }
		.toolbar .status { font-size: 11px; color: #a6adc8; }
		.content { flex: 1; overflow: hidden; display: flex; }
		.preview-panel { flex: 1; overflow-y: auto; padding: 20px; background: #1e1e2e; }
		.preview-panel.hidden { display: none; }
		.md-panel { flex: 1; display: flex; flex-direction: column; }
		.md-panel.hidden { display: none; }
		.md-editor { flex: 1; background: #11111b; color: #cdd6f4; border: none; padding: 16px; font-family: 'Cascadia Code','Consolas',monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; }
		.a4-page { width: 210mm; min-height: 297mm; background: #fff; color: #333; margin: 0 auto 20px; padding: 20mm 15mm 25mm 15mm; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-radius: 2px; font-size: 11px; line-height: 1.6; position: relative; page-break-after: always; overflow: hidden; }
		.a4-page h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; border-bottom: 2px solid #2563eb; padding-bottom: 6px; }
		.a4-page h2 { font-size: 15px; color: #2d2d44; margin: 16px 0 8px; border-left: 4px solid #2563eb; padding-left: 10px; }
		.a4-page h3 { font-size: 12px; color: #444; margin: 10px 0 5px; }
		.a4-page p { margin: 5px 0; } .a4-page ul,.a4-page ol { margin: 5px 0 5px 18px; } .a4-page li { margin: 2px 0; }
		.a4-page table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 9px; table-layout: fixed; word-wrap: break-word; overflow-wrap: break-word; }
		.a4-page th { background: #f0f4ff; padding: 4px 3px; text-align: left; border: 1px solid #ddd; font-weight: 600; font-size: 8px; }
		.a4-page td { padding: 3px; border: 1px solid #ddd; word-break: break-all; }
		.a4-page tr:nth-child(even) { background: #fafbff; }
		.a4-page .meta { color: #888; font-size: 10px; margin-bottom: 12px; }
		.a4-page .page-num { position: absolute; bottom: 10mm; right: 15mm; font-size: 10px; color: #aaa; }
		.price { color: #dc2626; font-weight: 600; }
		.stock-ok { color: #16a34a; } .stock-low { color: #ea580c; } .stock-none { color: #dc2626; }
		.summary-cards { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
		.card { flex: 1; min-width: 100px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; text-align: center; }
		.card .num { font-size: 18px; font-weight: 700; color: #2563eb; } .card .label { font-size: 9px; color: #64748b; margin-top: 3px; }
		.card.total .num { color: #dc2626; }
		.no-price { color: #999; font-style: italic; }
		.placeholder { color: #999; font-style: italic; }
		.toc-item { display: flex; align-items: baseline; margin: 5px 0; font-size: 12px; gap: 6px; }
		.toc-title { flex: 1; } .toc-dots { flex: 1; border-bottom: 1px dotted #999; margin: 0 4px; min-width: 20px; } .toc-page { color: #666; width: 24px; text-align: right; }
		.toc-h2 { font-weight: 600; margin-top: 8px; } .toc-h3 { padding-left: 18px; font-size: 11px; color: #555; }
		/* Editable TOC */
		.toc-edit { list-style: none; padding: 0; }
		.toc-edit li { display: flex; align-items: center; gap: 6px; padding: 6px 8px; margin: 3px 0; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; cursor: grab; }
		.toc-edit li:hover { background: #eff6ff; border-color: #93c5fd; }
		.toc-edit .toc-num { color: #94a3b8; font-size: 11px; min-width: 20px; }
		.toc-edit input { flex: 1; border: none; background: transparent; font-size: 13px; color: #333; outline: none; }
		.toc-edit .toc-del { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding: 0 4px; }
		.toc-edit .toc-del:hover { color: #dc2626; }
		.toc-add { display: inline-block; margin-top: 8px; padding: 4px 12px; background: #eff6ff; border: 1px dashed #93c5fd; border-radius: 4px; color: #2563eb; cursor: pointer; font-size: 12px; }
		.toc-add:hover { background: #dbeafe; }
		.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(30,30,46,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
		.loading-overlay.hidden { display: none; }
		.spinner { width: 40px; height: 40px; border: 3px solid #313244; border-top-color: #89b4fa; border-radius: 50%; animation: spin 0.8s linear infinite; }
		@keyframes spin { to { transform: rotate(360deg); } }
		.loading-text { margin-top: 16px; font-size: 14px; color: #a6adc8; }
		@media print { body{background:#fff;} .toolbar,.loading-overlay,.md-panel{display:none!important;} .content{padding:0;overflow:visible;} .preview-panel{padding:0;} .a4-page{box-shadow:none;margin:0;border-radius:0;width:100%;min-height:auto;page-break-after:always;} }
	</style>
</head>
<body>
	<div class="toolbar">
		<button class="primary" id="btnAI" onclick="generateByTOC()">🤖 AI 按目录生成</button>
		<div class="sep"></div>
		<button id="btnPreview" class="active" onclick="switchMode('preview')">预览</button>
		<button id="btnSource" onclick="switchMode('source')">源码</button>
		<div class="sep"></div>
		<button id="btnExportPdf" onclick="exportPdf()" disabled>PDF</button>
		<button id="btnExportHtml" onclick="exportHtml()" disabled>HTML</button>
		<div class="spacer"></div>
		<span class="status" id="statusText">就绪</span>
	</div>
	<div class="content">
		<div class="preview-panel" id="previewPanel">
			<div id="contentArea"><div class="a4-page"><p style="color:#888;text-align:center;padding:80px 0;">加载中...</p></div></div>
		</div>
		<div class="md-panel hidden" id="mdPanel">
			<textarea class="md-editor" id="mdEditor" spellcheck="false"></textarea>
		</div>
	</div>
	<div class="loading-overlay hidden" id="loadingOverlay"><div class="spinner"></div><div class="loading-text" id="loadingText">处理中...</div></div>

	<script>
		var procData = null, bomRows = [], currentMode = 'preview';

		function getDefaultTOC() {
			return [
				{ title: '采购概览', type: 'summary', prompt: '' },
				{ title: '采购清单', type: 'bom-table', prompt: '' },
				{ title: '成本分析', type: 'ai', prompt: '根据BOM数据分析总成本构成、成本占比最高的器件、各价格区间分布，给出成本优化建议。用表格展示价格区间分布。' },
				{ title: '库存风险', type: 'ai', prompt: '分析库存不足或无库存的器件、供应链风险、缺货替代方案。用表格列出风险器件清单（位号|型号|库存状态|风险等级|建议）。' },
				{ title: '采购建议', type: 'ai', prompt: '给出批量采购策略、替代料建议、供应商多元化建议、采购优先级排序。' }
			];
		}

		function init() {
			try {
				var raw = eda.sys_Storage.getExtensionUserConfig('prodoc_procurement');
				if (!raw) {
					document.getElementById('contentArea').innerHTML = '<div class="a4-page"><p style="color:#f38ba8;text-align:center;padding:80px 0;">未找到采购数据。<br>请在原理图编辑器中运行「采购报告」。</p></div>';
					return;
				}
				procData = JSON.parse(raw);
				bomRows = parseCsv(procData.bomCsv);
				renderTemplate();
			} catch(e) {
				console.error('[Docs-Generator]', e);
				document.getElementById('contentArea').innerHTML = '<div class="a4-page"><p style="color:#f38ba8;text-align:center;padding:80px 0;">数据加载失败: ' + String(e.message||e) + '</p></div>';
			}
		}

		function parseCsv(csv) {
			if (!csv) return [];
			var lines = csv.split('\n').filter(function(l){ return l.trim(); });
			if (lines.length < 2) return [];
			var hdr = lines[0].split('\t');
			var rows = [];
			for (var i = 1; i < lines.length; i++) {
				var cols = lines[i].split('\t');
				var row = {};
				for (var j = 0; j < hdr.length; j++) row[hdr[j].trim()] = (cols[j]||'').trim();
				rows.push(row);
			}
			return rows;
		}

		function renderTemplate() {
			if (!procData) return;
			var projName = procData.projectName || '未命名工程';
			var boardLabel = procData.boardName || '';
			var stats = calcStats();
			var pn = 1, html = '';

			// Cover
			var cv = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:247mm;text-align:center;">';
			cv += '<h1 style="font-size:26px;border:none;margin-bottom:8px;">' + esc(projName) + '</h1>';
			if (boardLabel) cv += '<p style="font-size:16px;color:#444;margin-bottom:10px;">' + esc(boardLabel) + '</p>';
			cv += '<p style="font-size:16px;color:#555;margin-bottom:8px;">采购报告</p>';
			cv += '<p class="meta" style="margin-top:20px;">BOM 行数: ' + bomRows.length + ' | 总器件数: ' + stats.totalQty + ' | 预估成本: &yen;' + stats.totalCost.toFixed(2) + '</p>';
			cv += '<p class="meta">' + new Date(procData.timestamp).toLocaleString() + '</p></div>';
			html += pg(cv, pn++);

			// Editable TOC page
			var tocHtml = '<h2>目录 <small style="font-size:11px;color:#888;font-weight:normal;">(编辑后点击「AI 按目录生成」)</small></h2>';
			tocHtml += '<ul class="toc-edit" id="tocEdit">';
			var defaultToc = getDefaultTOC();
			for (var i = 0; i < defaultToc.length; i++) {
				tocHtml += tocLi(i, defaultToc[i]);
			}
			tocHtml += '</ul>';
			tocHtml += '<span class="toc-add" onclick="addChapter()">+ 添加章节</span>';
			html += pg(tocHtml, pn++);

			document.getElementById('contentArea').innerHTML = html;
			document.getElementById('btnExportPdf').disabled = false;
			document.getElementById('btnExportHtml').disabled = false;
			setStatus('编辑目录后点击「AI 按目录生成」');
		}

		function calcStats() {
			var totalCost = 0, pricedCount = 0, noPriceCount = 0, totalQty = 0;
			for (var i = 0; i < bomRows.length; i++) {
				var r = bomRows[i];
				var qty = parseInt(r['Quantity']) || 0, price = parseFloat(r['LCSC Price']) || 0;
				totalQty += qty;
				if (price > 0) { totalCost += price * qty; pricedCount++; } else { noPriceCount++; }
			}
			return { totalCost: totalCost, pricedCount: pricedCount, noPriceCount: noPriceCount, totalQty: totalQty };
		}

		function tocLi(idx, item) {
			var dataAttr = ' data-type="' + esc(item.type || 'ai') + '"';
			if (item.prompt) dataAttr += ' data-prompt="' + esc(item.prompt) + '"';
			return '<li draggable="true"' + dataAttr + '><span class="toc-num">' + (idx+1) + '</span><input value="' + esc(item.title) + '" /><button class="toc-del" onclick="delChapter(this)">×</button></li>';
		}

		function addChapter() {
			var ul = document.getElementById('tocEdit');
			if (!ul) return;
			var idx = ul.children.length;
			var li = document.createElement('div');
			li.innerHTML = tocLi(idx, { title: '新章节', type: 'ai', prompt: '' });
			ul.appendChild(li.firstChild);
			renumberTOC();
		}

		function delChapter(btn) {
			btn.parentElement.remove();
			renumberTOC();
		}

		function renumberTOC() {
			var ul = document.getElementById('tocEdit');
			if (!ul) return;
			var items = ul.querySelectorAll('li');
			for (var i = 0; i < items.length; i++) {
				items[i].querySelector('.toc-num').textContent = (i+1);
			}
		}

		function readTOC() {
			var ul = document.getElementById('tocEdit');
			if (!ul) return [];
			var items = ul.querySelectorAll('li');
			var toc = [];
			for (var i = 0; i < items.length; i++) {
				var li = items[i];
				toc.push({
					title: li.querySelector('input').value,
					type: li.getAttribute('data-type') || 'ai',
					prompt: li.getAttribute('data-prompt') || ''
				});
			}
			return toc;
		}

		// ===== Generate by TOC =====
		async function generateByTOC() {
			var toc = readTOC();
			if (!toc.length) { eda.sys_Dialog.showInformationMessage('目录为空','Docs-Generator'); return; }
			var cfg = getApiConfig();
			// Only check API key if there are AI chapters
			var hasAI = false;
			for (var i = 0; i < toc.length; i++) { if (toc[i].type === 'ai') { hasAI = true; break; } }
			if (hasAI && !cfg.apiKey) { eda.sys_Dialog.showInformationMessage('请先配置 API（菜单 > Docs-Generator > 设置）','Docs-Generator'); return; }

			var confirmed = await new Promise(function(resolve) {
				eda.sys_Dialog.showConfirmationMessage(
					'AI 生成的内容可能存在虚构或不准确之处，请在使用前仔细核实。\n是否继续生成？',
					'AI 免责提示',
					'继续生成',
					'取消',
					function(ok) { resolve(ok); }
				);
			});
			if (!confirmed) return;

			showLoading('生成中...'); document.getElementById('btnAI').disabled = true;
			var projName = procData.projectName || '未命名工程';
			var boardLabel = procData.boardName || '';
			var stats = calcStats();
			var fullData = buildFullSummary();

			var pn = 1, html = '';

			// Cover
			var cv = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:247mm;text-align:center;">';
			cv += '<h1 style="font-size:26px;border:none;margin-bottom:8px;">' + esc(projName) + '</h1>';
			if (boardLabel) cv += '<p style="font-size:16px;color:#444;margin-bottom:10px;">' + esc(boardLabel) + '</p>';
			cv += '<p style="font-size:16px;color:#555;margin-bottom:8px;">采购报告</p>';
			cv += '<p class="meta" style="margin-top:20px;">BOM 行数: ' + bomRows.length + ' | 总器件数: ' + stats.totalQty + ' | 预估成本: &yen;' + stats.totalCost.toFixed(2) + '</p>';
			cv += '<p class="meta">' + new Date(procData.timestamp).toLocaleString() + '</p></div>';
			html += pg(cv, pn++);

			// TOC page (will be filled after generation)
			html += pg('<h2>目录</h2><div id="tocFinal"></div>', pn++);

			// Generate each chapter
			var hasErr = false;
			for (var ci = 0; ci < toc.length; ci++) {
				var ch = toc[ci];
				setStatus('生成 ' + (ci+1) + '/' + toc.length + ': ' + ch.title);
				document.getElementById('loadingText').textContent = ch.title;

				if (ch.type === 'summary') {
					// Summary cards - no AI
					var sumHtml = '<h2>' + esc(ch.title) + '</h2>';
					sumHtml += '<div class="summary-cards">';
					sumHtml += '<div class="card"><div class="num">' + bomRows.length + '</div><div class="label">BOM 行数</div></div>';
					sumHtml += '<div class="card"><div class="num">' + stats.totalQty + '</div><div class="label">总器件数</div></div>';
					sumHtml += '<div class="card"><div class="num">' + stats.pricedCount + '</div><div class="label">有价格</div></div>';
					sumHtml += '<div class="card"><div class="num">' + stats.noPriceCount + '</div><div class="label">无价格</div></div>';
					sumHtml += '<div class="card total"><div class="num">&yen;' + stats.totalCost.toFixed(2) + '</div><div class="label">预估单板成本</div></div>';
					sumHtml += '</div>';
					// No-price items
					var noPriceItems = bomRows.filter(function(r){ return !(parseFloat(r['LCSC Price']) > 0); });
					if (noPriceItems.length > 0) {
						sumHtml += '<h3>需手动询价 (' + noPriceItems.length + ')</h3>';
						sumHtml += '<table><thead><tr><th style="width:20%">位号</th><th style="width:20%">名称</th><th style="width:20%">器件型号</th><th style="width:20%">制造商</th><th style="width:10%">数量</th></tr></thead><tbody>';
						for (var ni = 0; ni < noPriceItems.length; ni++) {
							var nr = noPriceItems[ni];
							sumHtml += '<tr><td>' + esc(nr['Designator']) + '</td><td>' + esc(nr['Comment']||nr['Value']||'') + '</td><td>' + esc(nr['Manufacturer Part']||'') + '</td><td>' + esc(nr['Manufacturer']||'') + '</td><td>' + (nr['Quantity']||'') + '</td></tr>';
						}
						sumHtml += '</tbody></table>';
					}
					html += pg(sumHtml, pn++);

				} else if (ch.type === 'bom-table') {
					// BOM table split into 25-row chunks
					var chunkSize = 25;
					for (var start = 0; start < bomRows.length; start += chunkSize) {
						var chunk = bomRows.slice(start, start + chunkSize);
						var tbl = '';
						if (start === 0) tbl += '<h2>' + esc(ch.title) + '</h2>';
						tbl += '<table><thead><tr><th style="width:5%">No.</th><th style="width:5%">数量</th><th style="width:14%">位号</th><th style="width:12%">名称</th><th style="width:14%">器件型号</th><th style="width:10%">封装</th><th style="width:10%">制造商</th><th style="width:8%">供应商</th><th style="width:7%">库存</th><th style="width:7%">单价</th><th style="width:8%">小计</th></tr></thead><tbody>';
						for (var ri = 0; ri < chunk.length; ri++) {
							var r = chunk[ri], idx = start + ri;
							var qty = parseInt(r['Quantity'])||0, price = parseFloat(r['LCSC Price'])||0;
							var stock = parseInt(r['LCSC Stock'])||0, sub = price*qty;
							var sp = r['Supplier Part']||'';
							var sc = 'stock-ok', st = stock > 0 ? String(stock) : '-';
							if (stock <= 0) { sc = 'stock-none'; st = '无'; } else if (stock < qty*10) { sc = 'stock-low'; }
							tbl += '<tr><td>'+(idx+1)+'</td><td>'+qty+'</td><td><strong>'+esc(r['Designator'])+'</strong></td>';
							tbl += '<td>'+esc(r['Comment']||r['Value']||'')+'</td><td>'+esc(r['Manufacturer Part']||'')+'</td>';
							tbl += '<td>'+esc(r['Footprint']||'')+'</td><td>'+esc(r['Manufacturer']||'')+'</td>';
							tbl += '<td>'+(sp?esc(sp):'-')+'</td>';
							tbl += '<td class="'+sc+'">'+st+'</td>';
							tbl += '<td>'+(price>0?'<span class="price">'+price.toFixed(4)+'</span>':'<span class="no-price">-</span>')+'</td>';
							tbl += '<td>'+(sub>0?'<span class="price">'+sub.toFixed(2)+'</span>':'-')+'</td></tr>';
						}
						tbl += '</tbody></table>';
						html += pg(tbl, pn++);
					}

				} else {
					// AI chapter
					var pageHtml = '<h2>' + esc(ch.title) + '</h2>';
					try {
						var prompt = '【项目】' + esc(projName) + '\n\n请生成章节「' + ch.title + '」的内容。\n' + (ch.prompt||'') + '\n\n' + fullData + '\n\n用HTML标签输出（不要用代码块包裹）。用h3/p/ul/li/strong/table标签。简洁专业。';
						var result = await callLLM(cfg, prompt);
						if (result) pageHtml += result;
					} catch(e) {
						pageHtml += '<div style="color:#c00;border:1px solid #c00;padding:6px;border-radius:4px;margin:6px 0;font-size:10px;">生成失败: ' + esc(String(e.message||e).substring(0,150)) + '</div>';
						hasErr = true;
					}
					html += pg(pageHtml, pn++);
				}
			}

			document.getElementById('contentArea').innerHTML = html;
			extractAndRenderTOC();
			document.getElementById('btnExportPdf').disabled = false;
			document.getElementById('btnExportHtml').disabled = false;
			hideLoading(); document.getElementById('btnAI').disabled = false;
			setStatus(hasErr ? '部分生成失败' : '生成完成');
		}

		function buildFullSummary() {
			var stats = calcStats();
			var s = '=== BOM 采购数据 ===\n';
			s += '项目: ' + (procData.projectName||'未知') + '\n';
			s += 'BOM行数: ' + bomRows.length + ' | 总器件数: ' + stats.totalQty + '\n';
			s += '有价格: ' + stats.pricedCount + ' | 无价格: ' + stats.noPriceCount + '\n';
			s += '预估单板成本: ¥' + stats.totalCost.toFixed(2) + '\n\n';
			s += '器件清单:\n';
			for (var i = 0; i < bomRows.length; i++) {
				var r = bomRows[i];
				var price = parseFloat(r['LCSC Price'])||0, stock = parseInt(r['LCSC Stock'])||0;
				s += r['Designator'] + ' x' + r['Quantity'] + ': ' + (r['Comment']||r['Value']||'') + ' (' + (r['Manufacturer Part']||'-') + ') [' + (r['Manufacturer']||'') + '] 单价:' + (price>0?'¥'+price.toFixed(4):'无') + ' 库存:' + (stock>0?stock:'无') + '\n';
			}
			return s;
		}

		function extractAndRenderTOC() {
			var tc = document.getElementById('tocFinal'); if (!tc) return;
			var pages = document.querySelectorAll('.a4-page');
			var h = '';
			for (var i = 0; i < pages.length; i++) {
				if (pages[i].querySelector('#tocFinal') || pages[i].querySelector('#tocEdit')) continue;
				var hs = pages[i].querySelectorAll('h2, h3');
				for (var hi = 0; hi < hs.length; hi++) {
					var t = hs[hi].textContent.trim(); if (!t) continue;
					var cls = hs[hi].tagName === 'H2' ? 'toc-item toc-h2' : 'toc-item toc-h3';
					h += '<div class="' + cls + '"><span class="toc-title">' + esc(t) + '</span><span class="toc-dots"></span><span class="toc-page">' + (i+1) + '</span></div>';
				}
			}
			tc.innerHTML = h;
		}

		// ===== Shared utilities =====
		function pg(c, n) { return '<div class="a4-page" contenteditable="true">' + c + '<span class="page-num">' + n + '</span></div>'; }
		function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
		function formatHtml(html) {
			var formatted = '';
			var indent = 0;
			html = html.replace(/>\s*</g, '>\n<');
			var lines = html.split('\n');
			for (var i = 0; i < lines.length; i++) {
				var line = lines[i].trim();
				if (!line) continue;
				if (line.match(/^<\/(div|h[1-6]|p|ul|ol|li|table|thead|tbody|tr|th|td|section)/i)) indent = Math.max(0, indent - 1);
				formatted += '  '.repeat(indent) + line + '\n';
				if (line.match(/^<(div|h[1-6]|p|ul|ol|li|table|thead|tbody|tr|th|td|section)[^\/]*>$/i) && !line.match(/<\/[^>]+>$/)) indent++;
			}
			return formatted;
		}

		function switchMode(mode) {
			if (mode === currentMode) return;
			if (mode === 'source') {
				document.getElementById('mdEditor').value = formatHtml(document.getElementById('contentArea').innerHTML);
				document.getElementById('previewPanel').classList.add('hidden');
				document.getElementById('mdPanel').classList.remove('hidden');
				document.getElementById('btnSource').classList.add('active');
				document.getElementById('btnPreview').classList.remove('active');
			} else {
				document.getElementById('contentArea').innerHTML = document.getElementById('mdEditor').value;
				document.getElementById('mdPanel').classList.add('hidden');
				document.getElementById('previewPanel').classList.remove('hidden');
				document.getElementById('btnPreview').classList.add('active');
				document.getElementById('btnSource').classList.remove('active');
			}
			currentMode = mode;
		}

		// ===== API =====
		function getApiConfig() {
			try { var raw = eda.sys_Storage.getExtensionUserConfig('prodoc_api_config'); if (raw) { var c=JSON.parse(raw); return {format:c.format||'openai',baseUrl:c.baseUrl||'',apiKey:c.apiKey||'',model:c.model||'',temperature:c.temperature!=null?c.temperature:1.0,retryUntilSuccess:!!c.retryUntilSuccess}; } } catch(e){}
			return {format:'openai',baseUrl:'',apiKey:'',model:'',temperature:1.0,retryUntilSuccess:false};
		}
		function isRetryable(e){var m=String(e.message||'');return m.indexOf('429')!==-1||m.indexOf('529')!==-1||m.indexOf('overloaded')!==-1||m.indexOf('503')!==-1||m.indexOf('502')!==-1;}
		async function callLLM(cfg,prompt){var att=0;var max=cfg.retryUntilSuccess?999:2;while(true){att++;try{var r=cfg.format==='anthropic'?await fetchAnthropic(cfg,prompt):await fetchOpenAI(cfg,prompt);if(r)return r;}catch(e){if(isRetryable(e)&&att<max){setStatus('过载重试...');await sleep(Math.min(5+att*2,30)*1000);continue;}if(att<max){await sleep(2000);continue;}throw e;}}}
		async function fetchOpenAI(cfg,prompt){var url=cfg.baseUrl.replace(/\/$/,'')+'/chat/completions';var body={model:cfg.model,messages:[{role:'system',content:'你是电子工程采购分析专家，用中文回答。'},{role:'user',content:prompt}],temperature:cfg.temperature,stream:false};var resp=await eda.sys_ClientUrl.request(url,'POST',JSON.stringify(body),{headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey}});var t=await resp.text();if(!resp.ok)throw new Error('HTTP '+resp.status+': '+t.substring(0,200));var d=JSON.parse(t);if(d.choices&&d.choices[0]&&d.choices[0].message){var c=d.choices[0].message.content||'';c=c.replace(/<think>[\s\S]*?<\/think>/g,'');c=c.replace(/^```html\s*/i,'').replace(/\s*```$/i,'');return c.trim();}return null;}
		async function fetchAnthropic(cfg,prompt){var url=cfg.baseUrl.replace(/\/$/,'')+'/messages';var body={model:cfg.model,max_tokens:4096,system:'你是电子工程采购分析专家，用中文回答。',messages:[{role:'user',content:[{type:'text',text:prompt}]}],temperature:cfg.temperature,stream:false};var resp=await eda.sys_ClientUrl.request(url,'POST',JSON.stringify(body),{headers:{'Content-Type':'application/json','x-api-key':cfg.apiKey,'anthropic-version':'2023-06-01'}});var t=await resp.text();if(!resp.ok)throw new Error('HTTP '+resp.status+': '+t.substring(0,200));var d=JSON.parse(t);if(d.content&&Array.isArray(d.content)){var c='';for(var bi=0;bi<d.content.length;bi++)if(d.content[bi].type==='text')c+=d.content[bi].text;c=c.replace(/^```html\s*/i,'').replace(/\s*```$/i,'');return c.trim();}return null;}
		function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}
