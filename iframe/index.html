<!doctype html>
<html lang="zh-Hans">
<head>
	<title>项目文档生成器</title>
	<meta charset="utf-8" />
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }
		.toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #181825; border-bottom: 1px solid #313244; flex-shrink: 0; flex-wrap: wrap; }
		.toolbar button { padding: 5px 12px; border: 1px solid #45475a; border-radius: 5px; background: #313244; color: #cdd6f4; cursor: pointer; font-size: 12px; }
		.toolbar button:hover { background: #45475a; }
		.toolbar button.primary { background: #89b4fa; color: #1e1e2e; border-color: #89b4fa; font-weight: 600; }
		.toolbar button.active { background: #f9e2af; color: #1e1e2e; border-color: #f9e2af; }
		.toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
		.toolbar .sep { width: 1px; height: 20px; background: #45475a; margin: 0 4px; }
		.toolbar .spacer { flex: 1; }
		.toolbar .status { font-size: 11px; color: #a6adc8; }
		.content { flex: 1; overflow: hidden; display: flex; }
		.preview-panel { flex: 1; overflow-y: auto; padding: 20px; background: #1e1e2e; }
		.preview-panel.hidden { display: none; }
		.md-panel { flex: 1; display: flex; flex-direction: column; }
		.md-panel.hidden { display: none; }
		.md-editor { flex: 1; background: #11111b; color: #cdd6f4; border: none; padding: 16px; font-family: 'Cascadia Code','Consolas',monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; }
		.a4-page { width: 210mm; min-height: 297mm; background: #fff; color: #333; margin: 0 auto 20px; padding: 20mm 18mm 25mm 18mm; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-radius: 2px; font-size: 12px; line-height: 1.65; position: relative; page-break-after: always; overflow: hidden; }
		.a4-page h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; border-bottom: 2px solid #2563eb; padding-bottom: 6px; }
		.a4-page h2 { font-size: 16px; color: #2d2d44; margin: 18px 0 8px; border-left: 4px solid #2563eb; padding-left: 10px; }
		.a4-page h3 { font-size: 13px; color: #444; margin: 12px 0 6px; }
		.a4-page p { margin: 6px 0; } .a4-page ul,.a4-page ol { margin: 6px 0 6px 20px; } .a4-page li { margin: 3px 0; }
		.a4-page table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 10px; table-layout: fixed; word-wrap: break-word; }
		.a4-page th { background: #f0f4ff; color: #333; padding: 5px 6px; text-align: left; border: 1px solid #ddd; font-weight: 600; }
		.a4-page td { padding: 4px 6px; border: 1px solid #ddd; word-break: break-all; }
		.a4-page tr:nth-child(even) { background: #fafbff; }
		.a4-page .sch-image { max-width: 100%; border: 1px solid #ddd; border-radius: 3px; margin: 8px 0; }
		.a4-page .meta-info { color: #888; font-size: 10px; margin-bottom: 12px; }
		.a4-page .page-num { position: absolute; bottom: 10mm; right: 18mm; font-size: 10px; color: #aaa; }
		.a4-page .placeholder { color: #999; font-style: italic; }
		.toc-item { display: flex; align-items: center; margin: 5px 0; font-size: 13px; gap: 6px; }
		.toc-title { flex: 1; } .toc-dots { flex: 1; border-bottom: 1px dotted #999; margin: 0 4px; min-width: 20px; } .toc-page { color: #666; width: 24px; text-align: right; }
		.toc-h2 { font-weight: 600; margin-top: 8px; } .toc-h3 { padding-left: 20px; font-size: 12px; color: #555; }
		/* Editable TOC */
		.toc-edit { list-style: none; padding: 0; }
		.toc-edit li { display: flex; align-items: center; gap: 6px; padding: 6px 8px; margin: 3px 0; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; cursor: grab; }
		.toc-edit li:hover { background: #eff6ff; border-color: #93c5fd; }
		.toc-edit .toc-num { color: #94a3b8; font-size: 11px; min-width: 20px; }
		.toc-edit input { flex: 1; border: none; background: transparent; font-size: 13px; color: #333; outline: none; }
		.toc-edit .toc-del { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding: 0 4px; }
		.toc-edit .toc-del:hover { color: #dc2626; }
		.toc-add { display: inline-block; margin-top: 8px; padding: 4px 12px; background: #eff6ff; border: 1px dashed #93c5fd; border-radius: 4px; color: #2563eb; cursor: pointer; font-size: 12px; }
		.toc-add:hover { background: #dbeafe; }
		.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(30,30,46,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
		.loading-overlay.hidden { display: none; }
		.spinner { width: 40px; height: 40px; border: 3px solid #313244; border-top-color: #89b4fa; border-radius: 50%; animation: spin 0.8s linear infinite; }
		@keyframes spin { to { transform: rotate(360deg); } }
		.loading-text { margin-top: 16px; font-size: 14px; color: #a6adc8; }
		@media print { body{background:#fff;} .toolbar,.loading-overlay,.md-panel{display:none!important;} .content{padding:0;overflow:visible;} .preview-panel{padding:0;} .a4-page{box-shadow:none;margin:0;border-radius:0;width:100%;min-height:auto;page-break-after:always;} }
	</style>
</head>
<body>
	<div class="toolbar">
		<button class="primary" id="btnAI" onclick="generateByTOC()">🤖 AI 按目录生成</button>
		<div class="sep"></div>
		<button id="btnPreview" class="active" onclick="switchMode('preview')">预览</button>
		<button id="btnSource" onclick="switchMode('source')">源码</button>
		<div class="sep"></div>
		<button id="btnExportPdf" onclick="exportPdf()" disabled>PDF</button>
		<button id="btnExportHtml" onclick="exportHtml()" disabled>HTML</button>
		<div class="spacer"></div>
		<span class="status" id="statusText">就绪</span>
	</div>
	<div class="content">
		<div class="preview-panel" id="previewPanel">
			<div id="contentArea"><div class="a4-page"><p style="color:#888;text-align:center;padding:80px 0;">加载中...</p></div></div>
		</div>
		<div class="md-panel hidden" id="mdPanel">
			<textarea class="md-editor" id="mdEditor" spellcheck="false"></textarea>
		</div>
	</div>
	<div class="loading-overlay hidden" id="loadingOverlay"><div class="spinner"></div><div class="loading-text" id="loadingText">处理中...</div></div>

	<script>
		let docData = null, currentMode = 'preview';

		// Default TOC chapters for schematic document
		function getDefaultTOC() {
			var toc = [
				{ title: '系统架构 (System Architecture)', type: 'ai', prompt: '分析系统框图和电源树。用表格展示系统框图（模块|位号|型号|功能|接口）和电源树（输入|稳压器|输出|负载|备注）。' }
			];
			if (docData && docData.pages) {
				for (var i = 0; i < docData.pages.length; i++) {
					var p = docData.pages[i];
					toc.push({ title: p.pageName + ' - 电路分析', type: 'ai-page', pageIdx: i, prompt: '分析该原理图页的电路功能、模块划分和核心器件。' });
					toc.push({ title: p.pageName + ' - 器件清单', type: 'bom', pageIdx: i });
				}
			}
			return toc;
		}

		function init() {
			try {
				var raw = eda.sys_Storage.getExtensionUserConfig('prodoc_data');
				if (raw) { docData = JSON.parse(raw); renderTemplate(); }
				else { document.getElementById('contentArea').innerHTML = '<div class="a4-page"><p style="color:#f38ba8;text-align:center;padding:80px 0;">未找到数据，请在原理图编辑器中运行「生成项目文档」。</p></div>'; }
			} catch(e) { console.error('[Docs-Generator]', e); }
		}

		function renderTemplate() {
			if (!docData) return;
			var projName = docData.projectName || '未命名工程';
			var boardLabel = docData.boardName || '';
			var totalComps = docData.pages ? docData.pages.reduce(function(s,p){return s+p.components.length;},0) : 0;
			var pn = 1, html = '';

			// Cover
			var cv = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:247mm;text-align:center;">';
			cv += '<h1 style="font-size:28px;border:none;margin-bottom:8px;">' + esc(projName) + '</h1>';
			if (boardLabel) cv += '<p style="font-size:18px;color:#444;margin-bottom:12px;">' + esc(boardLabel) + '</p>';
			cv += '<p style="font-size:16px;color:#555;">项目文档</p>';
			cv += '<p class="meta-info" style="margin-top:24px;">原理图页数: '+(docData.pages?docData.pages.length:0)+' | 总器件数: '+totalComps+'</p>';
			cv += '<p class="meta-info">'+new Date(docData.timestamp).toLocaleString()+'</p></div>';
			html += pg(cv, pn++);

			// Editable TOC page
			var tocHtml = '<h2>目录 <small style="font-size:11px;color:#888;font-weight:normal;">(编辑后点击「AI 按目录生成」)</small></h2>';
			tocHtml += '<ul class="toc-edit" id="tocEdit">';
			var defaultToc = getDefaultTOC();
			for (var i = 0; i < defaultToc.length; i++) {
				tocHtml += tocLi(i, defaultToc[i]);
			}
			tocHtml += '</ul>';
			tocHtml += '<span class="toc-add" onclick="addChapter()">+ 添加章节</span>';
			html += pg(tocHtml, pn++);

			// Schematic preview pages (images only, no AI yet)
			if (docData.pages) {
				for (var i = 0; i < docData.pages.length; i++) {
					var p = docData.pages[i];
					var ph = '<h2>' + esc(p.pageName) + '</h2>';
					if (p.imageBase64) ph += '<img class="sch-image" src="' + p.imageBase64 + '" alt="' + esc(p.pageName) + '" />';
					ph += '<div id="page-content-' + i + '"><p class="placeholder">[AI 生成后填充]</p></div>';
					html += pg(ph, pn++);
				}
			}

			document.getElementById('contentArea').innerHTML = html;
			document.getElementById('btnExportPdf').disabled = false;
			document.getElementById('btnExportHtml').disabled = false;
			setStatus('编辑目录后点击「AI 按目录生成」');
		}

		function tocLi(idx, item) {
			var dataAttr = ' data-type="'+esc(item.type||'ai')+'"';
			if (item.pageIdx !== undefined) dataAttr += ' data-page="'+item.pageIdx+'"';
			if (item.prompt) dataAttr += ' data-prompt="'+esc(item.prompt)+'"';
			return '<li draggable="true"'+dataAttr+'><span class="toc-num">'+(idx+1)+'</span><input value="'+esc(item.title)+'" /><button class="toc-del" onclick="delChapter(this)">×</button></li>';
		}

		function addChapter() {
			var ul = document.getElementById('tocEdit');
			if (!ul) return;
			var idx = ul.children.length;
			var li = document.createElement('div');
			li.innerHTML = tocLi(idx, { title: '新章节', type: 'ai', prompt: '' });
			ul.appendChild(li.firstChild);
			renumberTOC();
		}

		function delChapter(btn) {
			var li = btn.parentElement;
			li.remove();
			renumberTOC();
		}

		function renumberTOC() {
			var ul = document.getElementById('tocEdit');
			if (!ul) return;
			var items = ul.querySelectorAll('li');
			for (var i = 0; i < items.length; i++) {
				items[i].querySelector('.toc-num').textContent = (i+1);
			}
		}

		function readTOC() {
			var ul = document.getElementById('tocEdit');
			if (!ul) return [];
			var items = ul.querySelectorAll('li');
			var toc = [];
			for (var i = 0; i < items.length; i++) {
				var li = items[i];
				toc.push({
					title: li.querySelector('input').value,
					type: li.getAttribute('data-type') || 'ai',
					pageIdx: li.getAttribute('data-page') !== null ? parseInt(li.getAttribute('data-page')) : undefined,
					prompt: li.getAttribute('data-prompt') || ''
				});
			}
			return toc;
		}

		// ===== Generate by TOC =====
		async function generateByTOC() {
			var toc = readTOC();
			if (!toc.length) { eda.sys_Dialog.showInformationMessage('目录为空','Docs-Generator'); return; }
			var cfg = getApiConfig();
			if (!cfg.apiKey) { eda.sys_Dialog.showInformationMessage('请先配置 API（菜单 > Docs-Generator > 设置）','Docs-Generator'); return; }

			var confirmed = await new Promise(function(resolve) {
				eda.sys_Dialog.showConfirmationMessage(
					'AI 生成的内容可能存在虚构或不准确之处，请在使用前仔细核实。\n是否继续生成？',
					'AI 免责提示',
					'继续生成',
					'取消',
					function(ok) { resolve(ok); }
				);
			});
			if (!confirmed) return;

			showLoading('生成中...'); document.getElementById('btnAI').disabled = true;
			var projName = docData.projectName || '未命名工程';
			var boardLabel = docData.boardName || '';
			var totalComps = docData.pages ? docData.pages.reduce(function(s,p){return s+p.components.length;},0) : 0;

			// Build context data
			var context = buildContext();

			// Infer project purpose
			setStatus('推断项目类型...');
			var projCtx = '';
			try { projCtx = await callLLM(cfg, '项目名称: '+projName+'\n'+context.icSummary+'\n请用50-100字推断项目类型和功能。纯文本。'); } catch(e) { projCtx = projName; }

			var pn = 1, html = '';

			// Cover
			var cv = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:247mm;text-align:center;">';
			cv += '<h1 style="font-size:28px;border:none;margin-bottom:8px;">'+esc(projName)+'</h1>';
			if (boardLabel) cv += '<p style="font-size:18px;color:#444;margin-bottom:12px;">'+esc(boardLabel)+'</p>';
			cv += '<p style="font-size:16px;color:#555;">项目文档</p>';
			cv += '<p class="meta-info" style="margin-top:24px;">'+new Date(docData.timestamp).toLocaleString()+'</p></div>';
			html += pg(cv, pn++);

			// TOC page (will be filled after generation)
			html += pg('<h2>目录</h2><div id="tocFinal"></div>', pn++);

			// Generate each chapter
			var hasErr = false;
			for (var ci = 0; ci < toc.length; ci++) {
				var ch = toc[ci];
				setStatus('生成 '+(ci+1)+'/'+toc.length+': '+ch.title);
				document.getElementById('loadingText').textContent = ch.title;

				var pageHtml = '<h2>'+esc(ch.title)+'</h2>';

				if (ch.type === 'bom' && ch.pageIdx !== undefined && docData.pages[ch.pageIdx]) {
					// BOM table - no AI needed
					pageHtml += bomTable(docData.pages[ch.pageIdx].components);
				} else if (ch.type === 'ai-page' && ch.pageIdx !== undefined && docData.pages[ch.pageIdx]) {
					// AI analysis for specific page
					var page = docData.pages[ch.pageIdx];
					if (page.imageBase64) pageHtml += '<img class="sch-image" src="'+page.imageBase64+'" alt="'+esc(page.pageName)+'" />';
					try {
						var prompt = '【项目背景】'+projCtx+'\n\n请对原理图页「'+page.pageName+'」进行分析。\n'+ch.prompt+'\n\n'+context.pageContext(ch.pageIdx)+'\n\n用HTML标签输出（不要用代码块包裹）。用h3/p/ul/li/strong/table标签。简洁专业。';
						var result = await callLLM(cfg, prompt);
						if (result) pageHtml += result;
					} catch(e) { pageHtml += '<div style="color:#c00;">生成失败: '+esc(String(e.message||e).substring(0,100))+'</div>'; hasErr = true; }
				} else {
					// Generic AI chapter
					try {
						var prompt = '【项目背景】'+projCtx+'\n\n请生成章节「'+ch.title+'」的内容。\n'+(ch.prompt||'')+'\n\n'+context.fullSummary+'\n\n用HTML标签输出（不要用代码块包裹）。用h3/p/ul/li/strong/table标签。简洁专业。';
						var result = await callLLM(cfg, prompt);
						if (result) pageHtml += result;
					} catch(e) { pageHtml += '<div style="color:#c00;">生成失败: '+esc(String(e.message||e).substring(0,100))+'</div>'; hasErr = true; }
				}

				html += pg(pageHtml, pn++);
			}

			document.getElementById('contentArea').innerHTML = html;
			// Build final TOC from rendered headings
			extractAndRenderTOC();
			document.getElementById('btnExportPdf').disabled = false;
			document.getElementById('btnExportHtml').disabled = false;
			hideLoading(); document.getElementById('btnAI').disabled = false;
			setStatus(hasErr ? '部分生成失败' : '生成完成');
		}

		function buildContext() {
			var allComps = [];
			if (docData.pages) { for (var p of docData.pages) for (var c of p.components) allComps.push(c); }
			var ics = allComps.filter(function(c){return c.designator.match(/^U\d/);});
			var icSummary = '关键IC:\n' + (ics.length ? ics.map(function(c){
				var m = c.manufacturerId || ''; var d = c.otherProperty && c.otherProperty['Description'] ? String(c.otherProperty['Description']).substring(0,80) : '';
				return c.designator+': '+(c.name||m)+(m?' ('+m+')':'')+(d?' - '+d:'');
			}).join('\n') : '无');

			var typeCounts = {};
			for (var c of allComps) { var pf = c.designator.replace(/[0-9]+$/,''); typeCounts[pf]=(typeCounts[pf]||0)+1; }
			var fullSummary = '器件统计: '+Object.entries(typeCounts).map(function(e){return e[0]+':'+e[1];}).join(', ')+'，共'+allComps.length+'个\n\n'+icSummary;

			// Add all component details
			fullSummary += '\n\n全部器件:\n';
			for (var c of allComps) {
				var v = c.otherProperty && c.otherProperty['Value'] ? String(c.otherProperty['Value']) : '';
				var m = c.manufacturerId || ''; var d = c.otherProperty && c.otherProperty['Description'] ? String(c.otherProperty['Description']).substring(0,60) : '';
				var n = c.name || v || m;
				fullSummary += c.designator+': '+n+(m&&m!==n?' ('+m+')':'')+(d?' - '+d:'')+'\n';
			}

			return {
				icSummary: icSummary,
				fullSummary: fullSummary,
				pageContext: function(idx) {
					if (!docData.pages || !docData.pages[idx]) return '';
					var p = docData.pages[idx];
					var s = '原理图页「'+p.pageName+'」器件:\n';
					for (var c of p.components) {
						var v = c.otherProperty && c.otherProperty['Value'] ? String(c.otherProperty['Value']) : '';
						var m = c.manufacturerId || ''; var d = c.otherProperty && c.otherProperty['Description'] ? String(c.otherProperty['Description']).substring(0,60) : '';
						var n = c.name || v || m;
						s += c.designator+': '+n+(m&&m!==n?' ('+m+')':'')+(d?' - '+d:'')+'\n';
					}
					return s;
				}
			};
		}

		function extractAndRenderTOC() {
			var tc = document.getElementById('tocFinal'); if (!tc) return;
			var pages = document.querySelectorAll('.a4-page');
			var h = '';
			for (var i = 0; i < pages.length; i++) {
				if (pages[i].querySelector('#tocFinal') || pages[i].querySelector('#tocEdit')) continue;
				var hs = pages[i].querySelectorAll('h2, h3');
				for (var hi = 0; hi < hs.length; hi++) {
					var t = hs[hi].textContent.trim(); if (!t) continue;
					var cls = hs[hi].tagName === 'H2' ? 'toc-item toc-h2' : 'toc-item toc-h3';
					h += '<div class="'+cls+'"><span class="toc-title">'+esc(t)+'</span><span class="toc-dots"></span><span class="toc-page">'+(i+1)+'</span></div>';
				}
			}
			tc.innerHTML = h;
		}

		// ===== Shared utilities =====
		function pg(c, n) { return '<div class="a4-page" contenteditable="true">'+c+'<span class="page-num">'+n+'</span></div>'; }
		function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
		function formatHtml(html) {
			var formatted = '';
			var indent = 0;
			html = html.replace(/>\s*</g, '>\n<');
			var lines = html.split('\n');
			for (var i = 0; i < lines.length; i++) {
				var line = lines[i].trim();
				if (!line) continue;
				if (line.match(/^<\/(div|h[1-6]|p|ul|ol|li|table|thead|tbody|tr|th|td|section)/i)) indent = Math.max(0, indent - 1);
				formatted += '  '.repeat(indent) + line + '\n';
				if (line.match(/^<(div|h[1-6]|p|ul|ol|li|table|thead|tbody|tr|th|td|section)[^\/]*>$/i) && !line.match(/<\/[^>]+>$/)) indent++;
			}
			return formatted;
		}

		function bomTable(comps) {
			if (!comps || !comps.length) return '<p class="placeholder">无器件</p>';
			var h = '<table><thead><tr><th style="width:6%">序号</th><th style="width:10%">位号</th><th style="width:16%">名称/值</th><th style="width:12%">封装</th><th style="width:16%">器件型号</th><th style="width:14%">制造商</th><th style="width:10%">供应商编号</th></tr></thead><tbody>';
			comps.forEach(function(c, i) {
				var val = c.otherProperty && c.otherProperty['Value'] ? c.otherProperty['Value'] : '';
				var fp = c.otherProperty && c.otherProperty['Supplier Footprint'] ? String(c.otherProperty['Supplier Footprint']) : '';
				var sp = c.supplierId || (c.otherProperty && c.otherProperty['Supplier Part'] ? c.otherProperty['Supplier Part'] : '');
				h += '<tr><td>'+(i+1)+'</td><td><strong>'+esc(c.designator)+'</strong></td><td>'+esc(c.name||val)+'</td><td>'+esc(fp)+'</td><td>'+esc(c.manufacturerId)+'</td><td>'+esc(c.manufacturer)+'</td><td>'+esc(sp)+'</td></tr>';
			});
			return h + '</tbody></table>';
		}

		function switchMode(mode) {
			if (mode === currentMode) return;
			if (mode === 'source') {
				document.getElementById('mdEditor').value = formatHtml(document.getElementById('contentArea').innerHTML);
				document.getElementById('previewPanel').classList.add('hidden');
				document.getElementById('mdPanel').classList.remove('hidden');
				document.getElementById('btnSource').classList.add('active');
				document.getElementById('btnPreview').classList.remove('active');
			} else {
				document.getElementById('contentArea').innerHTML = document.getElementById('mdEditor').value;
				document.getElementById('mdPanel').classList.add('hidden');
				document.getElementById('previewPanel').classList.remove('hidden');
				document.getElementById('btnPreview').classList.add('active');
				document.getElementById('btnSource').classList.remove('active');
			}
			currentMode = mode;
		}

		// ===== API =====
		function getApiConfig() {
			try { var raw = eda.sys_Storage.getExtensionUserConfig('prodoc_api_config'); if (raw) { var c=JSON.parse(raw); return {format:c.format||'openai',baseUrl:c.baseUrl||'',apiKey:c.apiKey||'',model:c.model||'',temperature:c.temperature!=null?c.temperature:1.0,retryUntilSuccess:!!c.retryUntilSuccess}; } } catch(e){}
			return {format:'openai',baseUrl:'',apiKey:'',model:'',temperature:1.0,retryUntilSuccess:false};
		}
		function isRetryable(e){var m=String(e.message||'');return m.indexOf('429')!==-1||m.indexOf('529')!==-1||m.indexOf('overloaded')!==-1||m.indexOf('503')!==-1||m.indexOf('502')!==-1;}
		async function callLLM(cfg,prompt){var att=0;var max=cfg.retryUntilSuccess?999:2;while(true){att++;try{var r=cfg.format==='anthropic'?await fetchAnthropic(cfg,prompt):await fetchOpenAI(cfg,prompt);if(r)return r;}catch(e){if(isRetryable(e)&&att<max){setStatus('过载重试...');await sleep(Math.min(5+att*2,30)*1000);continue;}if(att<max){await sleep(2000);continue;}throw e;}}}
		async function fetchOpenAI(cfg,prompt){var url=cfg.baseUrl.replace(/\/$/,'')+'/chat/completions';var body={model:cfg.model,messages:[{role:'system',content:'你是电子工程技术文档撰写专家，用中文回答。'},{role:'user',content:prompt}],temperature:cfg.temperature,stream:false};var resp=await eda.sys_ClientUrl.request(url,'POST',JSON.stringify(body),{headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey}});var t=await resp.text();if(!resp.ok)throw new Error('HTTP '+resp.status+': '+t.substring(0,200));var d=JSON.parse(t);if(d.choices&&d.choices[0]&&d.choices[0].message){var c=d.choices[0].message.content||'';c=c.replace(/<think>[\s\S]*?<\/think>/g,'');c=c.replace(/^```html\s*/i,'').replace(/\s*```$/i,'');return c.trim();}return null;}
		async function fetchAnthropic(cfg,prompt){var url=cfg.baseUrl.replace(/\/$/,'')+'/messages';var body={model:cfg.model,max_tokens:4096,system:'你是电子工程技术文档撰写专家，用中文回答。',messages:[{role:'user',content:[{type:'text',text:prompt}]}],temperature:cfg.temperature,stream:false};var resp=await eda.sys_ClientUrl.request(url,'POST',JSON.stringify(body),{headers:{'Content-Type':'application/json','x-api-key':cfg.apiKey,'anthropic-version':'2023-06-01'}});var t=await resp.text();if(!resp.ok)throw new Error('HTTP '+resp.status+': '+t.substring(0,200));var d=JSON.parse(t);if(d.content&&Array.isArray(d.content)){var c='';for(var b of d.content)if(b.type==='text')c+=b.text;c=c.replace(/^```html\s*/i,'').replace(/\s*```$/i,'');return c.trim();}return null;}
		function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

		// ===== Export =====
		function exportPdf(){
			if (eda.sys_Environment.isClient()) {
				eda.sys_Dialog.showInformationMessage('客户端环境暂不支持直接导出 PDF。\n请先导出 HTML，然后在浏览器中打开 HTML 文件并使用浏览器的打印功能保存为 PDF。', 'Docs-Generator');
				return;
			}
			var ca=document.getElementById('contentArea');var pw=window.open('','_blank');
			if(!pw)return;
			pw.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Docs-Generator</title><style>');
			pw.document.write('@page{size:A4;margin:20mm 18mm 25mm 18mm;}body{font-family:sans-serif;color:#333;font-size:12px;line-height:1.65;margin:0;padding:0;}');
			pw.document.write('.a4-page{page-break-after:always;padding:0;min-height:auto;width:auto;box-shadow:none;}h1{font-size:22px;border-bottom:2px solid #2563eb;padding-bottom:6px;}h2{font-size:16px;margin:18px 0 8px;border-left:4px solid #2563eb;padding-left:10px;}h3{font-size:13px;margin:12px 0 6px;}');
			pw.document.write('table{width:100%;border-collapse:collapse;margin:8px 0;font-size:10px;table-layout:fixed;}th{background:#f0f4ff;padding:5px 6px;border:1px solid #ddd;font-weight:600;}td{padding:4px 6px;border:1px solid #ddd;word-break:break-all;}tr:nth-child(even){background:#fafbff;}');
			pw.document.write('.sch-image{max-width:100%;border:1px solid #ddd;margin:8px 0;}.meta-info{color:#888;font-size:10px;}.page-num{text-align:right;font-size:10px;color:#aaa;}.placeholder{color:#999;font-style:italic;}');
			pw.document.write('.toc-item{display:flex;align-items:baseline;margin:6px 0;font-size:13px;}.toc-title{flex-shrink:0;}.toc-dots{flex:1;border-bottom:1px dotted #999;margin:0 6px;}.toc-page{flex-shrink:0;color:#666;}.toc-h2{font-weight:600;margin-top:10px;}.toc-h3{padding-left:20px;font-size:12px;color:#555;}');
			pw.document.write('.toc-edit{display:none;}');
			pw.document.write('</style></head><body>'+ca.innerHTML+'</body></html>');
			pw.document.close();eda.sys_Dialog.showInformationMessage('已在新窗口打开打印预览，请在新窗口完成打印/保存 PDF 操作后返回。', 'Docs-Generator');setTimeout(function(){pw.print();},600);
		}
		function exportHtml(){
			var ca=document.getElementById('contentArea');
			var h='<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><title>Docs-Generator Export</title><style>';
			h+='@page{size:A4;margin:20mm 18mm 25mm 18mm;}body{font-family:sans-serif;color:#333;font-size:12px;line-height:1.65;margin:0;padding:20mm 18mm;}';
			h+='.a4-page{width:210mm;min-height:297mm;background:#fff;padding:20mm 18mm 25mm 18mm;margin:0 auto 20px;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:relative;}';
			h+='.a4-page{page-break-after:always;margin-bottom:40px;}h1{font-size:22px;border-bottom:2px solid #2563eb;padding-bottom:6px;}h2{font-size:16px;margin:18px 0 8px;border-left:4px solid #2563eb;padding-left:10px;}h3{font-size:13px;margin:12px 0 6px;}';
			h+='table{width:100%;border-collapse:collapse;margin:8px 0;font-size:10px;table-layout:fixed;}th{background:#f0f4ff;padding:5px 6px;border:1px solid #ddd;font-weight:600;}td{padding:4px 6px;border:1px solid #ddd;word-break:break-all;}tr:nth-child(even){background:#fafbff;}';
			h+='.sch-image{max-width:100%;border:1px solid #ddd;margin:8px 0;}.meta-info{color:#888;font-size:10px;}.page-num{text-align:right;font-size:10px;color:#aaa;}.placeholder{color:#999;font-style:italic;}';
			h+='.toc-item{display:flex;align-items:baseline;margin:6px 0;font-size:13px;}.toc-title{flex-shrink:0;}.toc-dots{flex:1;border-bottom:1px dotted #999;margin:0 6px;}.toc-page{flex-shrink:0;color:#666;}.toc-h2{font-weight:600;margin-top:10px;}.toc-h3{padding-left:20px;font-size:12px;color:#555;}';
			h+='.toc-edit,.toc-add{display:none;}';
			h+='</style></head><body>'+ca.innerHTML+'</body></html>';
			eda.sys_FileSystem.saveFile(new Blob([h],{type:'text/html;charset=utf-8'}),'Docs-Generator_Export.html');
		}

		function showLoading(t){document.getElementById('loadingText').textContent=t;document.getElementById('loadingOverlay').classList.remove('hidden');}
		function hideLoading(){document.getElementById('loadingOverlay').classList.add('hidden');}
		function setStatus(t){document.getElementById('statusText').textContent=t;}

		init();
	</script>
